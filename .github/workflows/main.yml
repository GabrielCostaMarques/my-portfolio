name: Deploy to Hostinger

on:
  push:
    branches:
      - main  # Defina o branch que você quer usar para deploy (ex: main)

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # Checkout do repositório
      - name: Checkout code
        uses: actions/checkout@v2

      # Instalar dependências e construir o projeto
      - name: Install dependencies
        run: npm install

      - name: Build the project
        run: npx vite build

      # Fazer o deploy via FTP para a Hostinger
      - name: Deploy to FTP server
        uses: SamKirkland/FTP-Deploy-Action@4.3.0
        with:
          server: ${{ secrets.FTP_HOST }}  # O servidor FTP da Hostinger
          username: ${{ secrets.FTP_USERNAME }}  # Nome de usuário FTP (adicionado nos secrets)
          password: ${{ secrets.FTP_PASSWORD }}  # Senha FTP (adicionado nos secrets)
          local-dir: dist  # Diretório local onde está o build
          server-dir: /public_html/  # Diretório remoto no servidor FTP
